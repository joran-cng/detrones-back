name: CI/CD Backend - Nuxt & Colyseus

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  # 1. Job de compilation du monorépo (Nuxt types generation + build)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Nuxt types
        run: pnpm --filter @president/back exec nuxt prepare

      - name: Build Projects
        run: pnpm build

  # 2. Job des tests unitaires exécuté en parallèle
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Nuxt types
        run: pnpm --filter @president/back exec nuxt prepare

      - name: Run Tests
        run: pnpm test

  # 3. Job d'audit de sécurité des dépendances exécuté en parallèle
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Security Audit
        run: pnpm audit --audit-level=high || echo "Audit completed with some warnings"

  # 4. Job de migration et déploiement (dépend de la compilation, des tests et de l'audit)
  deploy:
    runs-on: ubuntu-latest
    needs: [build, unit-tests, security-audit]
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Database Schema (Prisma)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @president/back exec prisma db push

      - name: Trigger Deployments on Render
        run: |
          echo "Triggering API deploy..."
          curl -f -X POST "${{ secrets.RENDER_API_DEPLOY_HOOK }}"
          echo "Triggering Game Server deploy..."
          curl -f -X POST "${{ secrets.RENDER_GAME_SERVER_DEPLOY_HOOK }}"
